<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yu - Commissions Portfolio</title>

<style>
:root {
  --deep-navy: #140b3b;
  --mid-blue: #3128a1;
  --vibrant-purple: #8e2de2;
  --neon-cyan: #3dfcc1;
  --bright-cyan: #35deb5;
  --ocean-blue: #32a6c9;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
}

body {
  background: linear-gradient(135deg, var(--deep-navy), var(--mid-blue), var(--ocean-blue));
  background-attachment: fixed;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px;
}

/* --- CONTAINER PRINCIPAL --- */
.card {
  background: rgba(20, 11, 59, 0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  width: 100%;
  max-width: 500px;
  border-radius: 40px;
  padding: 25px;
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
  border: 1px solid rgba(61, 252, 193, 0.2);
  text-align: center;
}

/* --- PERFIL --- */
.perfil img {
  width: clamp(100px, 30vw, 150px);
  height: clamp(100px, 30vw, 150px);
  border-radius: 50%;
  border: 4px solid var(--neon-cyan);
  box-shadow: 0 0 20px rgba(61, 252, 193, 0.4);
  object-fit: cover;
  transition: transform 0.3s ease;
  cursor: pointer;
}

.perfil img:hover { transform: scale(1.05); }

h1 {
  font-size: clamp(24px, 8vw, 32px);
  color: #fff;
  margin: 15px 0 5px;
}

.status-badge {
  display: inline-block;
  background: var(--neon-cyan);
  padding: 8px 24px;
  border-radius: 50px;
  font-weight: 900;
  font-size: 14px;
  box-shadow: 0 0 15px var(--neon-cyan);
  animation: neon-pulse 2s infinite;
  color: #140b3b;
}

@keyframes neon-pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 10px var(--neon-cyan); }
  50% { transform: scale(1.05); box-shadow: 0 0 25px var(--neon-cyan); }
}

hr {
  border: 0;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  margin: 25px 0;
}

h2 {
  font-size: 14px;
  color: var(--bright-cyan);
  text-transform: uppercase;
  margin-bottom: 15px;
  letter-spacing: 2px;
}

/* --- CARROSSEL --- */
.carousel {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  margin: 20px 0;
}

.art-wrapper {
  width: 100%;
  aspect-ratio: 1 / 1;
  max-width: 300px;
  overflow: hidden;
  border-radius: 25px;
  border: 2px solid var(--vibrant-purple);
}

.art-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  cursor: pointer;
}

.art-img.active { display: block; animation: fadeIn 0.5s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.nav-btn {
  background: var(--vibrant-purple);
  color: white;
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  position: absolute;
  z-index: 5;
  transition: 0.2s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.prev { left: -10px; }
.next { right: -10px; }

/* --- TABELA DE PREÇOS INTEGRADA --- */
.price-container {
  background: rgba(142, 45, 226, 0.05);
  border: 1px solid rgba(61, 252, 193, 0.3);
  border-radius: 25px;
  padding: 20px;
  margin: 20px 0;
}

table { width: 100%; border-collapse: collapse; }

.header-row th { 
  color: var(--neon-cyan); 
  font-weight: bold; 
  font-size: 12px; 
  padding-bottom: 15px; 
  text-transform: uppercase;
  text-align: left;
}

.price-row td { 
  padding: 12px 0; 
  border-bottom: 1px solid rgba(255,255,255,0.05); 
  font-size: 14px; 
  color: #fff;
  text-align: left;
}

.price-row td:not(:first-child) {
  text-align: center;
}

.header-row th:not(:first-child) {
  text-align: center;
}

.info-list {
  text-align: left;
  margin-top: 20px;
  font-size: 13px;
  display: grid;
  gap: 8px;
  color: #fff;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 15px;
}

/* --- BOTÕES --- */
.btn-group {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  margin-top: 25px;
}

.btn {
  flex: 1;
  min-width: 140px;
  padding: 16px;
  border-radius: 18px;
  text-decoration: none;
  font-weight: bold;
  font-size: 15px;
  transition: 0.3s ease;
  text-align: center;
  color: #fff;
}

.btn-rules { background: rgba(49, 40, 161, 0.4); border: 1px solid var(--vibrant-purple); }
.btn-contact { background: linear-gradient(45deg, var(--ocean-blue), var(--bright-cyan)); color: #140b3b; }

.btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

/* --- MODAL (APENAS PARA IMAGENS) --- */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(10px);
  justify-content: center;
  align-items: center;
  z-index: 1000;
  padding: 20px;
}

#modalFullImg {
  max-width: 100%;
  max-height: 90vh;
  border-radius: 15px;
  object-fit: contain;
  border: 2px solid var(--neon-cyan);
}

@media (max-width: 400px) {
  .card { padding: 20px; }
  .btn-group { flex-direction: column; }
  .btn { width: 100%; }
}
</style>
</head>
<body>

<main class="card">
  <section class="perfil">
    <img src="kit.png" id="profilePic" onclick="openImageModal(this.src)" alt="Foto de Perfil">
    <h1>Yu</h1>
    <div class="status-badge">STATUS: OPEN</div>
  </section>

  <hr>

  <h2>Example of art</h2>
  <div class="carousel">
    <button class="nav-btn prev" onclick="changeArt(-1)" aria-label="Anterior">❮</button>
    <div class="art-wrapper">
      <img src="inoaoi.png" class="art-img active" onclick="openImageModal(this.src)">
      <img src="guynne.png" class="art-img" onclick="openImageModal(this.src)">
      <img src="jerza.png" class="art-img" onclick="openImageModal(this.src)">
      
         <img src="KeS.png" class="art-img" onclick="openImageModal(this.src)">
    </div>
    <button class="nav-btn next" onclick="changeArt(1)" aria-label="Próximo">❯</button>
  </div>

  <h2>Price List</h2>
  <div class="price-container">
    <table>
      <thead>
        <tr class="header-row">
          <th>Type</th>
          <th>Flat</th>
          <th>Shaded</th>
        </tr>
      </thead>
      <tbody>
        <tr class="price-row"><td>Headshot</td><td>R$10 / $5</td><td>R$20 / $10</td></tr>
        <tr class="price-row"><td>Halfbody</td><td>R$25 / $15</td><td>R$35 / $20</td></tr>
        <tr class="price-row"><td>Fullbody</td><td>R$40 / $25</td><td>R$50/ $30</td></tr>
      </tbody>
    </table>

    <div class="info-list">
      <div>✦ Couple: 50R$/20$</div>
      <div>✦ Simple Background: Free</div>

      <div>✦ 🐾 Extra Char :+R$20/ 10$ </div>
    </div>
  </div>

  <nav class="btn-group">
    <a href="rules.html" class="btn btn-rules">Rules</a>
    <a href="https://instagram.com/iyushiw_00" class="btn btn-contact">Contact Me</a>
  </nav>
</main>

<div class="modal" id="imageModal" onclick="closeModal()">
  <img id="modalFullImg" src="" alt="Ampliada">
</div>

<script>
let currentArt = 0;
const arts = document.querySelectorAll('.art-img');
const modal = document.getElementById('imageModal');
const modalImg = document.getElementById('modalFullImg');

function changeArt(dir) {
  arts[currentArt].classList.remove('active');
  currentArt = (currentArt + dir + arts.length) % arts.length;
  arts[currentArt].classList.add('active');
}

function openImageModal(src) {
  modal.style.display = 'flex';
  modalImg.src = src;
}

function closeModal() {
  modal.style.display = 'none';
}

document.addEventListener('keydown', (e) => {
  if (e.key === "Escape") closeModal();
});
</script>

</body>
</html>
